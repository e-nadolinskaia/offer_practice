[defaults]
inventory = ./inventory/hosts.ini
roles_path = ./roles
host_key_checking = False
remote_user = keit

[privilege_escalation]
become = True
become_method = sudo

[ssh_connection]
# Используем /tmp, так как там пути короче и всегда есть права на запись
ssh_args = -o ControlMaster=no -o ControlPersist=no -o StrictHostKeyChecking=no
pipelining = False